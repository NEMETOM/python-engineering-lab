# Replace stringData values before applying to a non-local cluster.
# kubectl create secret generic fixflux-secret \
#   --from-literal=postgres-user=fixuser \
#   --from-literal=postgres-password=<your-password> \
#   --from-literal=postgres-db=fixdb \
#   --namespace fixflux
apiVersion: v1
kind: Secret
metadata:
  name: fixflux-secret
  namespace: fixflux
type: Opaque
stringData:
  postgres-user: fixuser
  postgres-password: fixpass
  postgres-db: fixdb
  database-url: "postgresql://fixuser:fixpass@postgres:5432/fixdb"
