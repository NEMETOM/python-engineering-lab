# HPA requires metrics-server: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: matching-engine
  namespace: fixflux
  labels:
    app: matching-engine
spec:
  ports:
    - name: metrics
      port: 8003
      targetPort: 8003
  selector:
    app: matching-engine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-engine
  namespace: fixflux
  labels:
    app: matching-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matching-engine
  template:
    metadata:
      labels:
        app: matching-engine
    spec:
      containers:
        - name: matching-engine
          image: matching-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
              name: metrics
          envFrom:
            - configMapRef:
                name: fixflux-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: matching-engine
  namespace: fixflux
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: matching-engine
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
