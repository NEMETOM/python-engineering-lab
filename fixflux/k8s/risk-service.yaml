apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-service
  namespace: fixflux
  labels:
    app: risk-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-service
  template:
    metadata:
      labels:
        app: risk-service
    spec:
      containers:
        - name: risk-service
          image: risk-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: fixflux-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
