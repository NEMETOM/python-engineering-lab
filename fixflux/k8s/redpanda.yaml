# Redpanda - single-replica StatefulSet suitable for development / simulation.
# For production use the official Redpanda Helm chart: helm install redpanda redpanda/redpanda
#
# Listener design:
#   INTERNAL (port 9092)  - in-cluster services, advertises redpanda:9092
#   EXTERNAL (port 29092) - LoadBalancer maps localhost:9092 -> 29092 for local dev/tests
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redpanda-config
  namespace: fixflux
data:
  redpanda.yaml: |
    redpanda:
      kafka_api:
        - name: internal
          address: 0.0.0.0
          port: 9092
        - name: external
          address: 0.0.0.0
          port: 29092
      advertised_kafka_api:
        - name: internal
          address: redpanda
          port: 9092
        - name: external
          address: localhost
          port: 9092
      rpc_server:
        address: 0.0.0.0
        port: 33145
      advertised_rpc_api:
        address: redpanda-0.redpanda-headless.fixflux.svc.cluster.local
        port: 33145
      developer_mode: true
      data_directory: /var/lib/redpanda/data
      auto_create_topics_enabled: true
    pandaproxy:
      pandaproxy_api:
        - name: internal
          address: 0.0.0.0
          port: 8082
      advertised_pandaproxy_api:
        - name: internal
          address: redpanda
          port: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-headless
  namespace: fixflux
  labels:
    app: redpanda
spec:
  clusterIP: None
  ports:
    - name: kafka
      port: 9092
    - name: rpc
      port: 33145
  selector:
    app: redpanda
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: fixflux
  labels:
    app: redpanda
spec:
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: admin
      port: 9644
      targetPort: 9644
  selector:
    app: redpanda
---
# Exposes the EXTERNAL Redpanda listener on localhost:9092 for local integration tests.
# In-cluster services use the ClusterIP service above (redpanda:9092 -> INTERNAL listener).
apiVersion: v1
kind: Service
metadata:
  name: redpanda-external
  namespace: fixflux
  labels:
    app: redpanda
spec:
  type: LoadBalancer
  ports:
    - name: kafka-external
      port: 9092
      targetPort: 29092
  selector:
    app: redpanda
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redpanda-data
  namespace: fixflux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: fixflux
spec:
  serviceName: redpanda-headless
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v23.3.21
          command:
            - redpanda
            - --redpanda-cfg=/etc/redpanda/redpanda.yaml
            - --smp=1
            - --memory=400M
            - --overprovisioned
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 29092
              name: kafka-external
            - containerPort: 9644
              name: admin
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
            - name: redpanda-config
              mountPath: /etc/redpanda/redpanda.yaml
              subPath: redpanda.yaml
          resources:
            requests:
              cpu: 250m
              memory: 450Mi
            limits:
              cpu: 1000m
              memory: 600Mi
      volumes:
        - name: redpanda-data
          persistentVolumeClaim:
            claimName: redpanda-data
        - name: redpanda-config
          configMap:
            name: redpanda-config
