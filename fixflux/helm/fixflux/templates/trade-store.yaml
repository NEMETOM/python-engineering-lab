---
apiVersion: v1
kind: Service
metadata:
  name: trade-store
  namespace: {{ .Values.namespace }}
  labels:
    app: trade-store
    {{ include "fixflux.labels" . | nindent 4 }}
spec:
  type: LoadBalancer
  ports:
    - name: api
      port: 8000
      targetPort: 8000
  selector:
    app: trade-store-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-store-api
  namespace: {{ .Values.namespace }}
  labels:
    app: trade-store-api
    {{ include "fixflux.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.tradeStore.api.replicas }}
  selector:
    matchLabels:
      app: trade-store-api
  template:
    metadata:
      labels:
        app: trade-store-api
    spec:
      containers:
        - name: trade-store-api
          image: {{ include "fixflux.image" (dict "root" . "name" "trade-store") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: api
          envFrom:
            - configMapRef:
                name: fixflux-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fixflux-secret
                  key: database-url
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.tradeStore.resources | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-store-consumer
  namespace: {{ .Values.namespace }}
  labels:
    app: trade-store-consumer
    {{ include "fixflux.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trade-store-consumer
  template:
    metadata:
      labels:
        app: trade-store-consumer
    spec:
      containers:
        - name: trade-store-consumer
          image: {{ include "fixflux.image" (dict "root" . "name" "trade-store") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "trade_store.consumer"]
          envFrom:
            - configMapRef:
                name: fixflux-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fixflux-secret
                  key: database-url
          resources:
            {{- toYaml .Values.tradeStore.resources | nindent 12 }}
