---
apiVersion: v1
kind: Service
metadata:
  name: compliance-service
  namespace: {{ .Values.namespace }}
  labels:
    app: compliance-service
    {{ include "fixflux.labels" . | nindent 4 }}
spec:
  type: LoadBalancer
  ports:
    - name: api
      port: 8010
      targetPort: 8010
  selector:
    app: compliance-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-api
  namespace: {{ .Values.namespace }}
  labels:
    app: compliance-api
    {{ include "fixflux.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.complianceService.api.replicas }}
  selector:
    matchLabels:
      app: compliance-api
  template:
    metadata:
      labels:
        app: compliance-api
    spec:
      containers:
        - name: compliance-api
          image: {{ include "fixflux.image" (dict "root" . "name" "compliance-service") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8010
              name: api
          envFrom:
            - configMapRef:
                name: fixflux-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fixflux-secret
                  key: database-url
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: policies
              mountPath: /app/policies
          resources:
            {{- toYaml .Values.complianceService.resources | nindent 12 }}
      volumes:
        - name: policies
          configMap:
            name: compliance-policies
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-consumer
  namespace: {{ .Values.namespace }}
  labels:
    app: compliance-consumer
    {{ include "fixflux.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compliance-consumer
  template:
    metadata:
      labels:
        app: compliance-consumer
    spec:
      containers:
        - name: compliance-consumer
          image: {{ include "fixflux.image" (dict "root" . "name" "compliance-service") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "compliance_service.consumer"]
          envFrom:
            - configMapRef:
                name: fixflux-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fixflux-secret
                  key: database-url
          volumeMounts:
            - name: policies
              mountPath: /app/policies
          resources:
            {{- toYaml .Values.complianceService.resources | nindent 12 }}
      volumes:
        - name: policies
          configMap:
            name: compliance-policies
