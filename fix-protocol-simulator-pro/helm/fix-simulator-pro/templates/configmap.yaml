apiVersion: v1
kind: ConfigMap
metadata:
  name: fix-simulator-config
  namespace: {{ .Values.namespace }}
  labels:
    {{ include "fix-simulator.labels" . | nindent 4 }}
data:
  KAFKA_BROKER: "redpanda:9092"
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  PUBLISH_INTERVAL: {{ .Values.config.publishInterval | quote }}
