---
apiVersion: v1
kind: Service
metadata:
  name: matching-engine
  namespace: {{ .Values.namespace }}
  labels:
    app: matching-engine
    {{ include "fix-simulator.labels" . | nindent 4 }}
spec:
  ports:
    - name: metrics
      port: 8003
      targetPort: 8003
  selector:
    app: matching-engine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-engine
  namespace: {{ .Values.namespace }}
  labels:
    app: matching-engine
    {{ include "fix-simulator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.matchingEngine.replicas }}
  selector:
    matchLabels:
      app: matching-engine
  template:
    metadata:
      labels:
        app: matching-engine
    spec:
      containers:
        - name: matching-engine
          image: {{ include "fix-simulator.image" (dict "root" . "name" "matching-engine") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8003
              name: metrics
          envFrom:
            - configMapRef:
                name: fix-simulator-config
          resources:
            {{- toYaml .Values.matchingEngine.resources | nindent 12 }}
{{- if .Values.matchingEngine.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: matching-engine
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: matching-engine
  minReplicas: {{ .Values.matchingEngine.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.matchingEngine.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.matchingEngine.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
