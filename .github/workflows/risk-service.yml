name: Risk Service CI

on:
  push:
    paths:
      - 'fixflux/services/risk-service/**'
      - 'fixflux/shared/**'
      - '.github/workflows/risk-service.yml'
  pull_request:
    paths:
      - 'fixflux/services/risk-service/**'
      - 'fixflux/shared/**'
      - '.github/workflows/risk-service.yml'
  workflow_dispatch: # allow manual runs from the Actions tab
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC

# Restrict the default GITHUB_TOKEN to read-only; grant extra scopes explicitly
# in the steps that need them (e.g. packages: write for a registry push).
permissions:
  contents: read

# Cancel any in-progress run for the same workflow + branch when a new push
# arrives, avoiding redundant work and stale deployments.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    # All `run:` steps default to the project root unless overridden per-step.
    defaults:
      run:
        working-directory: fixflux

    steps:
      # ── 1. Source code ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # ── 2. Python runtime ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            fixflux/shared/pyproject.toml
            fixflux/services/risk-service/pyproject.toml

      # ── 3. Shared platform library ────────────────────────────────────────────
      # Must be installed before the service because the service imports from it.
      - name: Install shared module
        run: |
          python -m pip install --upgrade pip
          pip install -e ./shared

      # ── 4. Service + test tools ───────────────────────────────────────────────
      - name: Install service and test tools
        working-directory: fixflux/services/risk-service
        run: |
          pip install -e .
          pip install behave pytest pytest-cov ruff black isort mypy

      # ── 5. Unit tests with coverage ───────────────────────────────────────────
      - name: Run pytest with coverage
        working-directory: fixflux/services/risk-service
        run: |
          python -m pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85 \
            -v

      # ── 5b. BDD tests ─────────────────────────────────────────────────────────
      - name: Run BDD tests
        working-directory: fixflux/services/risk-service
        run: python -m behave tests/bdd/features/

      # ── 5b. Lint ──────────────────────────────────────────────────────────────
      - name: Lint (ruff, black, isort, mypy)
        working-directory: fixflux/services/risk-service
        run: |
          python -m ruff check .
          python -m black --check .
          python -m isort --check-only .
          python -m mypy src/

      # ── 6. Docker image ───────────────────────────────────────────────────────
      # Build context is fixflux/ so the Dockerfile can
      # COPY shared/ alongside the service source.
      - name: Build Docker image
        run: |
          docker build \
            --file services/risk-service/Dockerfile \
            --tag risk-service:latest \
            .

      # ── Bonus A: push to Docker Hub ───────────────────────────────────────────
      # Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
      #
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      #
      # - name: Tag and push to Docker Hub
      #   run: |
      #     IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/risk-service
      #     docker tag risk-service:latest ${IMAGE}:${{ github.sha }}
      #     docker tag risk-service:latest ${IMAGE}:latest
      #     docker push ${IMAGE}:${{ github.sha }}
      #     docker push ${IMAGE}:latest

      # ── Bonus B: deploy via SSH ───────────────────────────────────────────────
      # Required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY
      # Run this only after Bonus A so the image exists on the registry.
      #
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_SSH_KEY }}
      #     script: |
      #       docker pull ${{ secrets.DOCKERHUB_USERNAME }}/risk-service:latest
      #       docker stop risk-service || true
      #       docker rm  risk-service || true
      #       docker run -d \
      #         --name risk-service \
      #         --restart unless-stopped \
      #         ${{ secrets.DOCKERHUB_USERNAME }}/risk-service:latest
