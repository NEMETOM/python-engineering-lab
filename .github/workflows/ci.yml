#.github\workflows\ci.yml

name: Python Engineering Lab CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 06:00 UTC

jobs:

  # ==================================================
  # LINTING / FORMATTING / TYPE CHECK
  # ==================================================
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ["price-calculator", "pr-compliance-guard", "event_stream_risk_detector"]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run ruff (lint)
        run: ruff check src tests

      - name: Run black (formatting check)
        run: black --check src tests

      - name: Run isort (imports check)
        run: isort --check-only src tests

      - name: Run mypy (type check)
        run: mypy src tests


  # ==================================================
  # UNIT TESTS
  # ==================================================
  price-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: price-calculator
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run unit tests
        run: |
          pytest tests/test_price.py \
            --cov=calculator \
            --cov-report=term-missing \
            --cov-fail-under=90

  compliance-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pr-compliance-guard
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run unit tests
        run: |
          pytest tests/test_engine_from_json.py \
            --cov=compliance \
            --cov-report=term-missing \
            --cov-fail-under=90

  risk-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event_stream_risk_detector
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run unit tests with coverage
        run: |
          pytest tests/test_rules.py \
            --cov=event_stream_risk_detector \
            --cov-report=xml \
            --cov-fail-under=85
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: event_stream_risk_detector/coverage.xml


  # ==================================================
  # BDD TESTS
  # ==================================================
  price-bdd:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: price-calculator
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run BDD tests
        run: pytest tests/test_price_bdd.py -v

  compliance-bdd:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: pr-compliance-guard
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run BDD tests
        run: pytest tests/test_compliance_bdd.py -v

  risk-bdd:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event_stream_risk_detector
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run BDD tests
        run: pytest tests/test_customer_bdd.py -v