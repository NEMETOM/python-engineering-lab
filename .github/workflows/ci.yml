name: Python Engineering Lab CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:

  # ==================================================
  # LINT / FORMAT / TYPE CHECK (PER PROJECT)
  # ==================================================
  lint:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - price-calculator
          - pr-compliance-guard
          - event_stream_risk_detector

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project (with dev deps)
        run: |
          pip install -r requirements.txt
          pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Black check
        run: black --check .

      - name: Isort check
        run: isort --check-only .

      - name: MyPy
        run: mypy .


  # ==================================================
  # TESTS (PER PROJECT)
  # ==================================================
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: price-calculator
            python: "3.11"
            cov_package: calculator
            cov_fail: 90

          - project: pr-compliance-guard
            python: "3.11"
            cov_package: compliance
            cov_fail: 90

          - project: event_stream_risk_detector
            python: "3.12"
            cov_package: event_stream_risk_detector
            cov_fail: 75

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install project (with dev deps)
        run: |
          pip install -r requirements.txt
          pip install -e .[dev]

      - name: Run unit tests with coverage
        run: |
          pytest \
            --cov=${{ matrix.cov_package }} \
            --cov-report=term-missing \
            --cov-fail-under=${{ matrix.cov_fail }}

      - name: Run BDD tests
        run: pytest -k bdd -v