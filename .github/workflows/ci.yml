# .github/workflows/ci.yml

name: Python Engineering Lab CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 06:00 UTC

jobs:

  # ==================================================
  # LINT, FORMAT, AND TYPE CHECK (for all projects)
  # ==================================================
  lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: [price-calculator, pr-compliance-guard, event_stream_risk_detector]

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run ruff lint
        run: ruff check src tests

      - name: Run black formatting check
        run: black --check src tests

      - name: Run isort import sort check
        run: isort --check-only src tests

      - name: Run mypy type checks
        run: mypy src tests

  # ==================================================
  # UNIT TESTS
  # ==================================================
  unit:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        project: [price-calculator, pr-compliance-guard, event_stream_risk_detector]
        python-version: ["3.12"]

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run unit tests with coverage
        run: |
          pytest tests -m "not bdd" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.project }}
          path: coverage.xml

  # ==================================================
  # BDD TESTS
  # ==================================================
  bdd:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        project: [price-calculator, pr-compliance-guard, event_stream_risk_detector]
        python-version: ["3.12"]

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run BDD tests
        run: |
          pytest tests -m "bdd" -v