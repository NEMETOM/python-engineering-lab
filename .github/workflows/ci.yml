#.github\workflows\ci.yml

name: Python Engineering Lab CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 06:00 UTC

jobs:

  # ==================================================
  # LINT + FORMAT + TYPE CHECKS (ALL PROJECTS)
  # ==================================================
  lint:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - price-calculator
          - pr-compliance-guard
          - event_stream_risk_detector

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install lint tools
        run: |
          pip install ruff black isort mypy

      - name: Run Ruff
        run: ruff check .

      - name: Check formatting with Black
        run: black --check .

      - name: Check imports with Isort
        run: isort --check-only .

      - name: Type checking with MyPy
        run: mypy .


  # ==================================================
  # PRICE CALCULATOR
  # ==================================================
  price-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: price-calculator

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run unit tests with coverage
        run: |
          pytest tests/test_price.py \
            --cov=calculator \
            --cov-report=term-missing \
            --cov-fail-under=90

  price-bdd:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: price-calculator

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run BDD tests
        run: pytest tests/test_price_bdd.py -v


  # ==================================================
  # COMPLIANCE GUARD
  # ==================================================
  compliance-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pr-compliance-guard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run unit tests with coverage
        run: |
          pytest tests/test_engine_from_json.py \
            --cov=compliance \
            --cov-report=term-missing \
            --cov-fail-under=90

  compliance-bdd:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pr-compliance-guard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run BDD tests
        run: pytest tests/test_compliance_bdd.py -v


  # ==================================================
  # EVENT STREAM RISK DETECTOR
  # ==================================================
  risk-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event_stream_risk_detector

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/src" >> $GITHUB_ENV

      - name: Run unit tests with coverage
        run: |
          pytest tests/test_rules.py \
            --cov=event_stream_risk_detector \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75

      - name: Run BDD tests
        run: pytest tests/test_customer_bdd.py -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: risk-coverage-report
          path: coverage.xml