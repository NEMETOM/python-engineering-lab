name: FIX Simulator Pro - End-to-End Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday 07:00 UTC (after daily service CIs)

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Full Pipeline E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fix-protocol-simulator-pro

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            fix-protocol-simulator-pro/shared/pyproject.toml
            fix-protocol-simulator-pro/services/trade-store/pyproject.toml
            fix-protocol-simulator-pro/services/fix-gateway/pyproject.toml

      - name: Start full Docker pipeline
        run: |
          docker compose --profile full up --build -d
          echo "Waiting for services to be healthy..."
          sleep 30

      - name: Install Python test dependencies
        run: |
          pip install --upgrade pip
          pip install -e ./shared
          pip install -e ./services/trade-store
          pip install -e ./services/fix-gateway
          pip install behave kafka-python httpx sqlalchemy psycopg2-binary

      - name: Run E2E BDD tests
        env:
          KAFKA_BROKER: localhost:9092
          DATABASE_URL: postgresql://admin:admin@localhost:5433/tradedb
        run: |
          python -m behave tests/integration/features/filedrop_e2e_pipeline.feature \
            --tags="@e2e" \
            --no-capture \
            -v

      - name: Print container logs on failure
        if: failure()
        run: |
          docker compose logs --tail=50 order-service
          docker compose logs --tail=50 matching-engine
          docker compose logs --tail=50 trade-store-consumer

      - name: Tear down Docker pipeline
        if: always()
        run: docker compose --profile full down -v
