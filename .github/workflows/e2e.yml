name: FIXFlux - End-to-End Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday 07:00 UTC (after daily service CIs)

permissions:
  contents: write   # needed to push Allure report to gh-pages branch
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Full Pipeline E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fixflux

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            fixflux/shared/pyproject.toml
            fixflux/services/trade-store/pyproject.toml
            fixflux/services/fix-gateway/pyproject.toml

      - name: Start full Docker pipeline
        run: docker compose --profile full up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for postgres..."
          timeout 120 bash -c 'until docker compose exec -T postgres pg_isready -U fixuser -d fixdb -q; do sleep 3; done'
          echo "Waiting for redpanda..."
          timeout 120 bash -c 'until docker compose exec -T redpanda rpk cluster health 2>/dev/null; do sleep 3; done'
          echo "Waiting for trade-store API..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/health; do sleep 3; done'
          echo "All services ready"

      - name: Install Python test dependencies
        run: |
          pip install --upgrade pip
          pip install -e ./shared
          pip install -e ./services/trade-store
          pip install -e ./services/fix-gateway
          pip install behave allure-behave kafka-python httpx sqlalchemy psycopg2-binary

      - name: Run E2E BDD tests
        env:
          KAFKA_BROKER: localhost:9092
          DATABASE_URL: postgresql://fixuser:fixpass@localhost:5433/fixdb
        run: |
          python -m behave tests/integration/features/filedrop_e2e_pipeline.feature \
            --tags="@e2e" \
            --tags="~@volume" \
            --tags="~@chaos" \
            --no-capture \
            --junit --junit-directory reports/ \
            -f pretty \
            -f allure_behave.formatter:AllureFormatter -o allure-results/ \
            -v

      - name: Publish E2E test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E BDD Tests
          path: fixflux/reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Restore previous Allure history
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          mkdir -p fixflux/allure-results/history
          git checkout origin/gh-pages -- history 2>/dev/null \
            && cp -r history/. fixflux/allure-results/history/ \
            || echo "No previous Allure history (first run)"

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline
        working-directory: ${{ github.workspace }}

      - name: Generate Allure HTML report
        if: always()
        run: allure generate allure-results/ -o allure-report/ --clean

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3  # v3.9.3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: fixflux/allure-report

      - name: Print container logs on failure
        if: failure()
        run: |
          docker compose logs --tail=50 order-service
          docker compose logs --tail=50 matching-engine
          docker compose logs --tail=50 trade-store-consumer

      - name: Tear down Docker pipeline
        if: always()
        run: docker compose --profile full down -v

  volume:
    name: Volume E2E (manual only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    defaults:
      run:
        working-directory: fixflux

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            fixflux/shared/pyproject.toml
            fixflux/services/trade-store/pyproject.toml
            fixflux/services/fix-gateway/pyproject.toml

      - name: Start full Docker pipeline
        run: docker compose --profile full up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for postgres..."
          timeout 120 bash -c 'until docker compose exec -T postgres pg_isready -U fixuser -d fixdb -q; do sleep 3; done'
          echo "Waiting for redpanda..."
          timeout 120 bash -c 'until docker compose exec -T redpanda rpk cluster health 2>/dev/null; do sleep 3; done'
          echo "Waiting for trade-store API..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/health; do sleep 3; done'
          echo "All services ready"

      - name: Install Python test dependencies
        run: |
          pip install --upgrade pip
          pip install -e ./shared
          pip install -e ./services/trade-store
          pip install -e ./services/fix-gateway
          pip install behave kafka-python httpx sqlalchemy psycopg2-binary

      - name: Run volume BDD tests
        env:
          KAFKA_BROKER: localhost:9092
          DATABASE_URL: postgresql://fixuser:fixpass@localhost:5433/fixdb
        run: |
          python -m behave tests/integration/features/filedrop_e2e_pipeline.feature \
            --tags="@volume" \
            --no-capture \
            --junit --junit-directory reports/ \
            -v

      - name: Publish volume test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Volume BDD Tests
          path: fixflux/reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Print container logs on failure
        if: failure()
        run: |
          docker compose logs --tail=100 order-service
          docker compose logs --tail=100 matching-engine
          docker compose logs --tail=100 trade-store-consumer

      - name: Tear down Docker pipeline
        if: always()
        run: docker compose --profile full down -v
