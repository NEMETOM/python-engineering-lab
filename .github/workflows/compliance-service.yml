name: Compliance Service CI

on:
  push:
    paths:
      - 'fix-protocol-simulator-pro/services/compliance-service/**'
      - 'fix-protocol-simulator-pro/shared/**'
      - '.github/workflows/compliance-service.yml'
  pull_request:
    paths:
      - 'fix-protocol-simulator-pro/services/compliance-service/**'
      - 'fix-protocol-simulator-pro/shared/**'
      - '.github/workflows/compliance-service.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fix-protocol-simulator-pro

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            fix-protocol-simulator-pro/shared/pyproject.toml
            fix-protocol-simulator-pro/services/compliance-service/pyproject.toml

      - name: Install shared module
        run: pip install -e ./shared

      - name: Install service and test tools
        working-directory: fix-protocol-simulator-pro/services/compliance-service
        run: |
          pip install -e .
          pip install pytest pytest-cov ruff black isort mypy httpx behave

      - name: Run pytest with coverage
        working-directory: fix-protocol-simulator-pro/services/compliance-service
        run: |
          python -m pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85 \
            -v

      - name: Lint (ruff, black, isort, mypy)
        working-directory: fix-protocol-simulator-pro/services/compliance-service
        run: |
          python -m ruff check .
          python -m black --check .
          python -m isort --check-only .
          python -m mypy src/

      - name: Build Docker image
        run: |
          docker build \
            --file services/compliance-service/Dockerfile \
            --tag compliance-service:latest \
            .
